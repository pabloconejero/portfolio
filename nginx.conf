# Drop this file in /etc/nginx/sites-available/portfolio
# then: sudo ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
# and:  sudo certbot --nginx -d yourdomain.com   (adds SSL block automatically)

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # certbot will inject the ssl_certificate lines here
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Allow larger payloads for media uploads
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for slow Payload admin operations
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
