services:
  app:
    build: .
    restart: unless-stopped
    # Bind only to localhost — nginx on the host proxies into this port
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - db_data:/app/data
      - media_data:/app/media
    environment:
      DATABASE_URL: file:/app/data/portfolio.db
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      MEDIA_DIR: /app/media
      # Email
      SMTP_HOST: smtp
      SMTP_PORT: 25
      SMTP_FROM: ${SMTP_FROM}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
    depends_on:
      - smtp

  smtp:
    image: boky/postfix
    restart: unless-stopped
    # Not exposed on the host — only reachable from within the compose network
    environment:
      ALLOWED_SENDER_DOMAINS: ${SMTP_DOMAIN}
      # Uncomment to relay through an external provider (Gmail, Brevo, etc.)
      # instead of sending directly from the VPS IP
      # RELAYHOST: "[smtp.gmail.com]:587"
      # RELAYHOST_USERNAME: ${SMTP_RELAY_USER}
      # RELAYHOST_PASSWORD: ${SMTP_RELAY_PASSWORD}

volumes:
  db_data:
  media_data:
